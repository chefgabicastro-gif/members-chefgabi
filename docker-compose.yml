version: "3.9"
services:
  api:
    build:
      context: ./apps/api
    container_name: members-api
    environment:
      - PORT=4000
      - WEB_ORIGIN=http://localhost:3000
      - WEBHOOK_SECRET=dev_webhook_secret
      - ADMIN_KEY=dev_admin_key
    ports:
      - "4000:4000"
    volumes:
      - ./apps/api/data:/app/data

  web:
    build:
      context: ./apps/web
    container_name: members-web
    environment:
      - WEB_PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      - api

