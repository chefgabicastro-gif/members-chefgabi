<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">ProfitBoard Pro</title>
  <desc id="desc">Logo neon verde com grafico de crescimento</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7bffbc"/>
      <stop offset="100%" stop-color="#1de07b"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="8" y="8" width="112" height="112" rx="22" fill="#0b1b14" stroke="#2f7d55" stroke-width="4"/>

  <path d="M26 88 L48 68 L64 76 L94 42" fill="none" stroke="url(#g)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <circle cx="94" cy="42" r="7" fill="#89ffca" filter="url(#glow)"/>

  <rect x="28" y="94" width="72" height="8" rx="4" fill="#1c4c34"/>
</svg>
